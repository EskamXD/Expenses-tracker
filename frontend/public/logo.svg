<svg width="320" height="320" viewBox="0 0 320 320" fill="none"
    xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect x="0" y="0" width="320" height="320" rx="32" fill="#0F172A" />

    <!-- Wallet shape -->
    <rect x="64" y="96" width="192" height="128" rx="20"
        fill="#1E293B" stroke="#38BDF8" stroke-width="4" />

    <!-- Wallet pocket -->
    <rect x="64" y="132" width="192" height="48" rx="16"
        fill="#0F172A" />

    <!-- Chart bars -->
    <rect x="104" y="152" width="16" height="40" rx="4" fill="#38BDF8" />
    <rect x="144" y="136" width="16" height="56" rx="4" fill="#22C55E" />
    <rect x="184" y="160" width="16" height="32" rx="4" fill="#FACC15" />
    <rect x="224" y="120" width="16" height="72" rx="4" fill="#A855F7" />

    <!-- Dot (coin / transaction indicator) -->
    <circle cx="240" cy="112" r="6" fill="#38BDF8" />

</svg>
